<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Review | Isaac Ihoon</title>

  <meta name="description" content="Submit a product review with rating, features, and feedback.">
  <meta name="author" content="Isaac Ihoon">

  <link rel="stylesheet" href="styles/form.css">
  <script src="script/form.js" defer></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>
  <form method="get" action="review.html">

    <!-- Product -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- Rating -->
    <fieldset>
      <legend>Overall Rating</legend>

      <label><input type="radio" name="rating" value="1" required> ☆</label>
      <label><input type="radio" name="rating" value="2"> ☆☆</label>
      <label><input type="radio" name="rating" value="3"> ☆☆☆</label>
      <label><input type="radio" name="rating" value="4"> ☆☆☆☆</label>
      <label><input type="radio" name="rating" value="5"> ☆☆☆☆☆</label>
    </fieldset>

    <!-- Date -->
    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

    <!-- Features -->
    <fieldset>
      <legend>Useful Features</legend>

      <label><input type="checkbox" name="features" value="Durability"> Durability</label>
      <label><input type="checkbox" name="features" value="Ease of Use"> Ease of Use</label>
      <label><input type="checkbox" name="features" value="Performance"> Performance</label>
      <label><input type="checkbox" name="features" value="Design"> Design</label>
    </fieldset>

    <!-- Review -->
    <label for="review">Written Review (Optional)</label>
    <textarea id="review" name="review" rows="4"></textarea>

    <!-- Name -->
    <label for="username">Your Name (Optional)</label>
    <input type="text" id="username" name="username">

    <!-- Submit -->
    <input type="submit" value="Post Review">

  </form>
</main>

<footer>
  <p>© <span id="year"></span> Isaac Ihoon</p>
  <p id="lastModified"></p>
</footer>

</body>
</html>
