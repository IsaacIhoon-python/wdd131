<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Review | Isaac Ihoon</title>

  <meta name="description" content="Submit a product review with rating, features, and feedback.">
  <meta name="author" content="Isaac Ihoon">

  <link rel="stylesheet" href="styles/form.css">
  <script src="script/form.js" defer></script>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>
  <form method="get" action="review.html">

    <!-- Product -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- Rating -->
<fieldset>
  <legend>Overall Rating</legend>

  <label for="star1">
    <input type="radio" id="star1" name="rating" value="1" required> ☆
  </label>

  <label for="star2">
    <input type="radio" id="star2" name="rating" value="2"> ☆☆
  </label>

  <label for="star3">
    <input type="radio" id="star3" name="rating" value="3"> ☆☆☆
  </label>

  <label for="star4">
    <input type="radio" id="star4" name="rating" value="4"> ☆☆☆☆
  </label
  <label for="star5">
    <input type="radio" id="star5" name="rating" value="5"> ☆☆☆☆☆
  </label>

</fieldset>

    <!-- Date -->
    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

<!--Form-->

<!--Features-->
<fieldset>
  <legend>Which features did you find useful?</legend>

  <label for="durability">
    <input type="checkbox" id="durability" name="features" value="durability">
    Durability
  </label>

  <label for="ease">
    <input type="checkbox" id="ease" name="features" value="ease">
    Ease of Use
  </label>

  <label for="performance">
    <input type="checkbox" id="performance" name="features" value="performance">
    Performance
  </label>

  <label for="design">
    <input type="checkbox" id="design" name="features" value="design">
    Design
  </label>
</fieldset>

    <!-- Review -->
    <label for="review">Written Review (Optional)</label>
    <textarea id="review" name="review" rows="4"></textarea>

    <!-- Name -->
    <label for="username">Your Name (Optional)</label>
    <input type="text" id="username" name="username">

    <!-- Submit -->
    <input type="submit" value="Post Review">

  </form>
</main>

<footer>
  <p>© <span id="year"></span> Isaac Ihoon</p>

</footer>
