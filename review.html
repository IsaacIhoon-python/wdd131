<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Review Submitted</title>

  <link rel="stylesheet" href="styles/form.css">
</head>

<body>

<header>
  <h1>Review Submitted</h1>
</header>

<main>
  <p>Thank you! Your review has been submitted successfully.</p>

  <p>Total Reviews Submitted:
    <strong><span id="counter"></span></strong>
  </p>
</main>

<footer>
  <p>© <span id="year"></span> Isaac Ihoon</p>
  <p id="lastModified"></p>
</footer>

<script>
let count = localStorage.getItem("reviews") || 0;
count++;
localStorage.setItem("reviews", count);

document.getElementById("counter").textContent = count;

document.getElementById("year").textContent = new Date().getFullYear();
document.getElementById("lastModified").textContent =
  "Last Updated: " + document.lastModified;
</script>

</body>
</html>
